name: Container Scan

on:
  push:
    branches: [ "main" ]
  pull_request:

permissions:
  contents: read
  security-events: write

jobs:
  snyk-container-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t myimage:latest .

      - name: Install Snyk CLI
        uses: snyk/actions/setup@v3

      - name: Authenticate Snyk
        run: snyk auth ${{ secrets.SNYK_TOKEN }}

      - name: Snyk Container Test (SARIF output)
        run: |
          snyk container test myimage:latest \
            --sarif-file-output=snyk.sarif \
            --severity-threshold=low || true

      # --- FIX: LIMPIAR EL SARIF PARA EVITAR ERRORES DE GITHUB CODE SCANNING ---
      - name: Fix SARIF (remove null severities)
        run: |
          jq '
            (.runs[].tool.driver.rules[]?.properties["security-severity"]) |=
            (if . == null then "0" else . end)
          ' snyk.sarif > fixed.sarif

          mv fixed.sarif snyk.sarif

      # --- SUBIR A GITHUB SECURITY TAB ---
      - name: Upload SARIF to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: snyk.sarif
