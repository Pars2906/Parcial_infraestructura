name: Snyk Security Scan

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  security:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Install Snyk
        run: npm install -g snyk

      - name: Authenticate Snyk
        run: snyk auth ${{ secrets.SNYK_TOKEN }}

      - name: Run Snyk test and create SARIF report
        run: snyk test --sarif-file-output=snyk.sarif --sarif-add-level

      # ---- Fixes null severity values (prevents GitHub error) ----
      - name: Normalize SARIF file (fix null severity)
        run: |
          jq '
            .runs[].results[].properties."security-severity" |= 
            (if . == null or . == "" then "0" else . end)
          ' snyk.sarif > snyk-fixed.sarif

      # ---- Upload to GitHub Code Scanning ----
      - name: Upload results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: snyk-fixed.sarif
          wait-for-processing: true
